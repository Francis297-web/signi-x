<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn KSL — Signix</title>
<link rel="icon" href="image/SIGNIX.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--blue:#2563EB;--violet:#7C3AED;--dark:#0F172A}
body{font-family:'Inter',sans-serif;background:#F8FAFF;color:#1E293B}
.brand{font-family:'Space Grotesk';font-weight:700;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--dark)}
.logo-circle{width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid #E2E8F0;display:grid;place-items:center;overflow:hidden}
.logo-circle img{width:100%;height:100%;object-fit:contain;padding:7px}
.search-wrap{background:#fff;border:2px solid #E2E8F0;border-radius:999px;padding:6px;display:flex;align-items:center;box-shadow:0 8px 24px rgba(15,23,42,.05)}
.search-wrap.form-control{border:0;box-shadow:none;background:transparent}
.filter-pill{border:2px solid #E2E8F0;background:#fff;border-radius:999px;padding:8px 16px;font-weight:600}
.filter-pill.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.sign-card{border:2px solid #E9ECF6;border-radius:20px;background:#fff;overflow:hidden;transition:.2s;height:100%}
.sign-card:hover{transform:translateY(-3px);box-shadow:0 16px 32px rgba(15,23,42,.08)}
.thumb img,.thumb video{width:100%;height:190px;object-fit:cover;background:#000;display:block}
</style>
</head>
<body>
<nav class="navbar sticky-top bg-white border-bottom"><div class="container py-2 d-flex align-items-center gap-2">
<button class="btn btn-light border rounded-circle" data-bs-toggle="offcanvas" data-bs-target="#sideMenu" style="width:42px;height:42px"><i class="bi bi-list"></i></button>
<a href="index.html" class="brand ms-1"><span class="logo-circle"><img src="image/SIGNIX.png"></span>Signix</a>
<div class="ms-auto"><a href="upload.html" class="btn btn-dark rounded-pill px-4">Upload</a></div>
</div></nav>

<div class="offcanvas offcanvas-start" id="sideMenu" style="width:300px"><div class="offcanvas-body"><a href="index.html" class="btn btn-light w-100 rounded-pill mb-2">Home</a><a href="learn.html" class="btn btn-dark w-100 rounded-pill">Learn</a><a href="upload.html" class="btn btn-light w-100 rounded-pill mt-2">Studio</a></div></div>

<section class="py-4"><div class="container">
<div class="p-4 p-lg-5 rounded-5 text-white" style="background:linear-gradient(135deg,#0F172A,#1E1B4B 50%,#1E3A8A)">
<h1 class="display-6 fw-bold">Search Community Signs</h1>
<p class="text-white-50">Only shows current photos and videos uploaded on this site.</p>
<div class="search-wrap mt-3"><i class="bi bi-search ms-3 text-secondary"></i><input id="searchInput" class="form-control" placeholder="Search Asante, maji, school..."><button id="searchBtn" type="button" class="btn btn-dark rounded-pill px-4">Search</button></div>
</div></div></section>

<section class="container pb-5">
<div class="d-flex gap-2 flex-wrap mb-3" id="filterPills">
<button class="filter-pill active" data-filter="all">All</button>
<button class="filter-pill" data-filter="image">Images only</button>
<button class="filter-pill" data-filter="video">Videos only</button>
</div>
<div id="signGrid" class="row g-3"></div>
<div id="noResults" class="d-none text-center py-5 bg-white border-2 border rounded-4 mt-3"><i class="bi bi-collection fs-1 text-secondary"></i><p class="fw-bold mt-2">No uploads match your search</p><p class="small text-secondary">Upload a sign in Studio first, then search it here.</p><a href="upload.html" class="btn btn-dark rounded-pill px-4 mt-2">Go to Studio</a></div>
<div id="emptyState" class="text-center py-5 bg-white border-2 border rounded-4 mt-3"><i class="bi bi-cloud-upload fs-1 text-secondary"></i><p class="fw-bold mt-2">No uploads yet</p><p class="small text-secondary">Your learn page will only display what you and others upload.</p></div>
</section>

<!-- SCRIPTS - CORRECT ORDER - LATEST UMD 2.50.0 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Supabase Library - Latest UMD compliant with publishable keys -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.min.js"></script>

<!-- Supabase Config -->
<script src="js/supabase.js"></script>

<script>
const grid=document.getElementById('signGrid'), input=document.getElementById('searchInput'), btn=document.getElementById('searchBtn'), noRes=document.getElementById('noResults'), empty=document.getElementById('emptyState');
let activeFilter='all';

function getUploads(){try{return JSON.parse(localStorage.getItem('signix_videos')||'[]')}catch{return[]}}

function render(list){
 grid.innerHTML='';
 if(!getUploads().length){empty.classList.remove('d-none');noRes.classList.add('d-none');return;}
 empty.classList.add('d-none');
 if(!list.length){noRes.classList.remove('d-none');return;}
 noRes.classList.add('d-none');
 list.forEach(v=>{
  const col=document.createElement('div');col.className='col-md-4 col-sm-6';
  const media = v.isImage? `<img src="${v.url}">` : `<video src="${v.url}" muted playsinline></video>`;
  col.innerHTML=`<div class="sign-card"><div class="thumb">${media}</div><div class="p-3"><div class="d-flex justify-content-between"><b>${v.word}</b><span class="badge bg-light text-dark border rounded-pill">${v.isImage?'Image':'Video'} • ${v.views||0} views</span></div><div class="small text-secondary mt-1">${v.desc||''}</div><div class="small text-secondary mt-1">by ${v.signer}</div><a href="lesson.html?word=${encodeURIComponent(v.word)}" class="btn btn-light border rounded-pill w-100 mt-3 btn-sm fw-semibold">Open</a></div></div>`;
  grid.appendChild(col);
 });
}

function doSearch(){
 const q=input.value.trim().toLowerCase();
 let all=getUploads();
 let filtered=all.filter(v=>{
  const matchQ =!q || v.word.toLowerCase().includes(q) || (v.desc&&v.desc.toLowerCase().includes(q)) || v.signer.toLowerCase().includes(q);
  const matchType = activeFilter==='all' || (activeFilter==='image'&&v.isImage) || (activeFilter==='video'&&!v.isImage);
  return matchQ && matchType;
 });
 render(filtered);
}

btn.addEventListener('click',doSearch);
input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch();}});
input.addEventListener('input',doSearch);
document.querySelectorAll('.filter-pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;doSearch();});});

render(getUploads());
</script>
</body>
</html>
