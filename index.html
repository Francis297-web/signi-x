<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signix — Every sign language, one place</title>
<link rel="icon" href="image/SIGNIX.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--blue:#2563EB;--violet:#7C3AED;--green:#10B981}body{font-family:'Inter',sans-serif;background:#F8FAFF;color:#1E293B}
.logo{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:1.4rem;color:#0F172A;text-decoration:none}
.logo-img{height:36px}.btn-gradient{background:linear-gradient(135deg,var(--blue),var(--violet) 55%,var(--green));border:0;color:#fff}
.feed-card{position:relative;border-radius:20px;overflow:hidden;height:280px;background:#0F172A;color:#fff;display:flex;flex-direction:column;justify-content:flex-end}
.feed-card video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.feed-card .bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(15,23,42,.92) 100%);z-index:1}
.feed-card .meta{position:relative;z-index:2;padding:16px}
.bot-bubble{max-width:85%;padding:12px 14px;border-radius:18px;font-size:.9rem}.bot-bubble.ai{background:#fff;border:1px solid #E2E8F0}.bot-bubble.user{background:linear-gradient(135deg,var(--blue),var(--violet));color:#fff;margin-left:auto}
</style>
</head>
<body>
<nav class="navbar sticky-top border-bottom bg-white"><div class="container py-2 d-flex gap-2"><a href="index.html" class="logo"><img src="image/SIGNIX.png" class="logo-img">Signix</a><a href="upload.html" class="ms-auto btn btn-dark rounded-pill px-4">Upload</a></div></nav>

<main>
<section class="py-5"><div class="container">
  <h2 class="fw-bold">From the community — real uploads only</h2>
  <div id="realFeed" class="row g-3 mt-3"></div>
  <div id="realEmpty" class="d-none text-center py-5 border rounded-4 bg-white">
    <h5>No community uploads yet</h5><p class="text-secondary small">Fake creators removed. Your real upload will show here.</p>
    <a href="upload.html" class="btn btn-dark rounded-pill">Upload a sign</a>
  </div>
</div></section>
</main>

<div class="offcanvas offcanvas-end" id="aiBot" style="width:380px;max-width:100vw">
  <div class="offcanvas-header text-white" style="background:linear-gradient(135deg,#2563EB,#7C3AED)"><h6 class="mb-0">Signix AI Bot</h6><button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
  <div class="offcanvas-body d-flex flex-column p-0">
    <div id="chatWindow" class="flex-grow-1 p-3 d-flex flex-column gap-3" style="overflow-y:auto;background:#F8FAFF"><div class="bot-bubble ai">Jambo! Ask me about KSL or how to upload.</div></div>
    <div class="p-3 border-top bg-white"><div class="input-group"><input id="chatInput" class="form-control rounded-pill" placeholder="Ask about a sign..."><button id="sendBtn" class="btn btn-dark rounded-circle ms-2" style="width:44px;height:44px"><i class="bi bi-send-fill"></i></button></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// REAL FEED ONLY
const feed=document.getElementById('realFeed'); const empty=document.getElementById('realEmpty');
function renderFeed(videos){
  feed.innerHTML=''; if(!videos.length){ empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  videos.slice(0,6).forEach(v=>{
    const d=document.createElement('div'); d.className='col-12 col-sm-6 col-md-4';
    d.innerHTML=`<div class="feed-card"><video src="${v.url}" controls muted playsinline></video><div class="bg-overlay"></div><div class="meta"><div class="fw-bold">${v.word||'Untitled'}</div><div class="small opacity-75">@${(v.signer||'anon').replace('@','')} • real upload</div></div></div>`;
    feed.appendChild(d);
  });
}
async function loadReal(){
  let local=JSON.parse(localStorage.getItem('signix_videos')||'[]');
  let cloud=[]; try{ const r=await fetch(`https://res.cloudinary.com/dvtlbpkly/video/list/signix.json?v=${Date.now()}`); if(r.ok){ const j=await r.json(); cloud=(j.resources||[]).map(x=>({url:`https://res.cloudinary.com/dvtlbpkly/video/upload/${x.public_id}.mp4`,word:x.context?.custom?.word||x.public_id,signer:x.context?.custom?.signer||'community',createdAt:new Date(x.created_at).getTime()})); } }catch(e){}
  renderFeed([...local,...cloud].sort((a,b)=>b.createdAt-a.createdAt));
}
loadReal();
</script>

<!-- THIS IS THE ONLY BOT LINK YOU ASKED FOR -->
<script src="Signix.bot.js"></script>
</body>
</html>
