<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload — Signix</title>
<link rel="icon" href="image/SIGNIX.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="CSS/style.css?v=5">
<script>const u=JSON.parse(localStorage.getItem('signix_user')||'null');if(!u)location.replace('auth.html')</script>
<style>
:root{--blue:#2563EB;--violet:#7C3AED} body{background:#F8FAFF;font-family:Inter}
.stat-card{background:#fff;border:1px solid #E2E8F0;border-radius:20px;padding:18px;text-align:center}
.video-card{background:#fff;border-radius:20px;overflow:hidden;border:1px solid #E2E8F0}
.video-card video{width:100%;height:220px;object-fit:cover;background:#000}
.side-link{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;color:#334155;text-decoration:none}
.side-link.active{background:#F1F5F9;color:#0F172A}
</style>
</head>
<body>
<nav class="navbar bg-white border-bottom sticky-top"><div class="container d-flex align-items-center gap-2">
<button class="btn btn-light border rounded-circle" data-bs-toggle="offcanvas" data-bs-target="#sideMenu" style="width:42px;height:42px"><i class="bi bi-list"></i></button>
<a href="index.html" class="fw-bold text-dark text-decoration-none ms-1">Signix</a>
<a href="index.html" class="ms-auto btn btn-outline-dark rounded-pill">Home Feed</a>
</div></nav>

<div class="offcanvas offcanvas-start" id="sideMenu" style="width:300px"><div class="offcanvas-body p-3 d-flex flex-column">
<a href="index.html" class="side-link"><i class="bi bi-house"></i> Home</a>
<a href="upload.html" class="side-link active"><i class="bi bi-cloud-upload"></i> Upload / Studio</a>
<a href="#" onclick="localStorage.removeItem('signix_user');location.href='auth.html'" class="side-link text-danger mt-auto"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div></div>

<div class="container py-4">
  <!-- Profile Stats like TikTok -->
  <div class="bg-white border rounded-4 p-4 mb-4 d-flex flex-wrap gap-4 align-items-center">
    <img id="avatar" style="width:72px;height:72px;border-radius:50%">
    <div><h4 id="pName" class="fw-bold mb-1"></h4><div id="pEmail" class="text-secondary small"></div></div>
    <div class="ms-auto d-flex gap-3">
      <div class="stat-card"><div id="sUploads" class="fw-bold fs-5">0</div><div class="small text-secondary">Uploads</div></div>
      <div class="stat-card"><div id="sLikes" class="fw-bold fs-5">0</div><div class="small text-secondary">Likes</div></div>
      <div class="stat-card"><div id="sViews" class="fw-bold fs-5">0</div><div class="small text-secondary">Views</div></div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="bg-white border rounded-4 p-4">
        <h6 class="fw-bold">Upload New Sign</h6>
        <form id="uploadForm" class="d-grid gap-3 mt-3">
          <input id="vWord" class="form-control" placeholder="Word e.g. Asante" required>
          <textarea id="vDesc" class="form-control" placeholder="Description / meaning"></textarea>
          <input id="vFile" type="file" accept="video/*" class="form-control" required>
          <button class="btn btn-dark rounded-pill">Publish</button>
        </form>
        <div class="small text-secondary mt-3">Videos are saved locally as real uploads. No fake creators.</div>
      </div>
    </div>
    <div class="col-lg-8">
      <h6 class="fw-bold mb-3">My Uploads</h6>
      <div id="myGrid" class="row g-3"></div>
    </div>
  </div>
</div>

<!-- Comment Modal -->
<div class="modal fade" id="commentModal"><div class="modal-dialog modal-dialog-centered"><div class="modal-content rounded-4">
<div class="modal-header"><h6 class="modal-title">Comments</h6><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body"><div id="commentList" class="d-grid gap-2 mb-3"></div>
<div class="input-group"><input id="commentInput" class="form-control rounded-pill" placeholder="Add a comment..."><button id="commentSend" class="btn btn-dark rounded-pill ms-2">Send</button></div></div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const user=JSON.parse(localStorage.getItem('signix_user'));
document.getElementById('pName').textContent=user.name;
document.getElementById('pEmail').textContent=user.email;
document.getElementById('avatar').src=`https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=2563EB&color=fff`;

function getVideos(){return JSON.parse(localStorage.getItem('signix_videos')||'[]')}
function saveVideos(v){localStorage.setItem('signix_videos',JSON.stringify(v)); render()}

function render(){
  const all=getVideos(); const mine=all.filter(v=>v.signerEmail===user.email);
  const totalLikes=mine.reduce((a,b)=>a+(b.likes||0),0);
  const totalViews=mine.reduce((a,b)=>a+(b.views||0),0);
  document.getElementById('sUploads').textContent=mine.length;
  document.getElementById('sLikes').textContent=totalLikes;
  document.getElementById('sViews').textContent=totalViews;

  const grid=document.getElementById('myGrid'); grid.innerHTML='';
  if(!mine.length){grid.innerHTML='<p class="text-secondary small">No uploads yet. Publish your first sign.</p>'; return;}
  mine.forEach(v=>{
    const col=document.createElement('div'); col.className='col-md-6';
    col.innerHTML=`<div class="video-card"><video src="${v.url}" controls onplay="addView('${v.id}')"></video>
    <div class="p-3"><div class="d-flex justify-content-between"><b>${v.word}</b><span class="small text-secondary">${v.views||0} views</span></div>
    <div class="d-flex gap-3 mt-2 small">
      <button class="btn btn-sm btn-light border rounded-pill" onclick="like('${v.id}')"><i class="bi bi-heart-fill me-1 text-danger"></i>${v.likes||0} Likes</button>
      <button class="btn btn-sm btn-light border rounded-pill" onclick="openComments('${v.id}')"><i class="bi bi-chat me-1"></i>${(v.comments||[]).length} Comments</button>
    </div></div>`; grid.appendChild(col);
  });
}
function addView(id){ let vids=getVideos(); let it=vids.find(x=>x.id===id); if(it){it.views=(it.views||0)+1; saveVideos(vids);} }
window.like=(id)=>{ let vids=getVideos(); let it=vids.find(x=>x.id===id); it.likes=(it.likes||0)+1; saveVideos(vids); }
let activeId=null;
window.openComments=(id)=>{ activeId=id; let vids=getVideos(); let it=vids.find(x=>x.id===id); let list=document.getElementById('commentList'); list.innerHTML=''; (it.comments||[]).forEach(c=>{list.innerHTML+=`<div class="bg-light border rounded-3 p-2 small"><b>${c.by}</b>: ${c.text}</div>`}); new bootstrap.Modal('#commentModal').show(); }
document.getElementById('commentSend').onclick=()=>{ const txt=document.getElementById('commentInput').value.trim(); if(!txt||!activeId)return; let vids=getVideos(); let it=vids.find(x=>x.id===activeId); it.comments=it.comments||[]; it.comments.push({by:user.name,text:txt,at:Date.now()}); document.getElementById('commentInput').value=''; saveVideos(vids); openComments(activeId); }

document.getElementById('uploadForm').addEventListener('submit', e=>{
  e.preventDefault(); const file=document.getElementById('vFile').files[0]; if(!file)return;
  const url=URL.createObjectURL(file);
  const newVid={id:Date.now().toString(),word:document.getElementById('vWord').value,desc:document.getElementById('vDesc').value,url,signer:user.name,signerEmail:user.email,likes:0,views:0,comments:[],createdAt:Date.now()};
  let vids=getVideos(); vids.unshift(newVid); saveVideos(vids); e.target.reset();
});
render();
</script>
</body>
</html>
