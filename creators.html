<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creators — Signix</title>
<link rel="icon" href="image/SIGNIX.png"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--blue:#2563EB;--violet:#7C3AED;--green:#10B981;--dark:#0F172A}body{font-family:'Inter',sans-serif;background:#F8FAFF;color:#1E293B}
.logo-circle{width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid #E2E8F0;display:flex;align-items:center;justify-content:center;overflow:hidden}.logo-circle img{width:100%;height:100%;object-fit:contain;padding:7px}
.creator-card{position:relative;border-radius:22px;overflow:hidden;height:340px;background:#0F172A;border:1px solid #E2E8F0;transition:.2s}
.creator-card video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.creator-card.meta{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:14px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.85));color:#fff}
.play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.9);display:grid;place-items:center;z-index:2}
</style></head><body>
<nav class="navbar sticky-top border-bottom bg-white"><div class="container py-2 d-flex gap-2"><a href="index.html" class="fw-bold text-decoration-none text-dark d-flex align-items-center gap-2"><span class="logo-circle"><img src="image/SIGNIX.png"></span>Signix</a><a href="upload.html" class="ms-auto btn btn-dark rounded-pill px-4">Upload</a></div></nav>
<section class="py-5"><div class="container">
<h2 class="fw-bold">Community Uploads</h2><p class="text-secondary">Only real videos uploaded by users. No demo accounts.</p>
<div class="row g-3 g-md-4 mt-3" id="feedGrid"></div>
<div id="emptyState" class="text-center py-5 d-none"><span class="logo-circle mx-auto mb-3" style="width:64px;height:64px"><img src="image/SIGNIX.png"></span><h5>No uploads yet</h5><p class="text-secondary">Your upload will appear here. If you just uploaded, re-upload once with the new code above.</p><a href="upload.html" class="btn btn-dark rounded-pill mt-2">Be the first to upload</a></div>
</div></section>
<script>
const grid=document.getElementById('feedGrid');const empty=document.getElementById('emptyState');
function render(videos){
  grid.innerHTML='';
  if(!videos.length){ empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');
  videos.forEach(v=>{
    const col=document.createElement('div'); col.className='col-12 col-sm-6 col-lg-4 col-xl-3';
    col.innerHTML=`<div class="creator-card"><video src="${v.url}" controls playsinline preload="metadata"></video><div class="play"><i class="bi bi-play-fill fs-3"></i></div><div class="meta"><div class="fw-bold">${v.word||'Untitled'}</div><div class="small opacity-75">@${(v.signer||'anonymous').replace('@','')} • ${v.category||''} • ${v.language||'KSL'}</div></div></div>`;
    grid.appendChild(col);
  });
}
async function load(){
  let cloudVideos=[];
  try{
    const r=await fetch(`https://res.cloudinary.com/dvtlbpkly/video/list/signix.json?v=${Date.now()}`);
    if(r.ok){ const j=await r.json(); cloudVideos=(j.resources||[]).map(x=>({url:`https://res.cloudinary.com/dvtlbpkly/video/upload/${x.public_id}.mp4`,word:x.context?.custom?.word||x.public_id,signer:x.context?.custom?.signer||'community',category:'Community',language:'KSL',createdAt:new Date(x.created_at).getTime()})); }
  }catch(e){}
  const localVideos=JSON.parse(localStorage.getItem('signix_videos')||'[]');
  const all=[...localVideos,...cloudVideos].sort((a,b)=>b.createdAt-a.createdAt);
  render(all);
}
load();
</script>
</body></html>
