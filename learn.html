<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn KSL — Signix</title>
<link rel="icon" href="image/SIGNIX.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--blue:#2563EB;--violet:#7C3AED;--green:#10B981;--dark:#0F172A}
body{font-family:'Inter',sans-serif;background:#F8FAFF;color:#1E293B}
h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif}
.navbar{backdrop-filter:blur(12px);background:rgba(255,255,255,.92)!important}
.logo-circle{width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid #E2E8F0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.logo-circle img{width:100%;height:100%;object-fit:contain;padding:7px}
.brand{display:inline-flex;align-items:center;gap:10px;font-weight:700;font-size:1.35rem;color:var(--dark);text-decoration:none}
.btn-gradient{background:linear-gradient(135deg,var(--blue),var(--violet) 60%,var(--green));border:0;color:#fff}
.search-wrap{background:#fff;border:2px solid #E2E8F0;border-radius:999px;padding:6px;box-shadow:0 8px 24px rgba(15,23,42,.05);display:flex;align-items:center}
.search-wrap .form-control{border:0;box-shadow:none;background:transparent}
.filter-pill{border:2px solid #E2E8F0;background:#fff;border-radius:999px;padding:8px 16px;font-weight:600;white-space:nowrap}
.filter-pill.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.sign-card{border:2px solid #E9ECF6;border-radius:20px;background:#fff;overflow:hidden;transition:.2s;height:100%}
.sign-card:hover{transform:translateY(-3px);box-shadow:0 16px 32px rgba(15,23,42,.08)}
.thumb{aspect-ratio:16/10;background:linear-gradient(135deg,#DBEAFE,#EDE9FE 50%,#D1FAE5);display:grid;place-items:center;font-size:2rem}
.menu-link{display:flex;gap:12px;padding:12px 14px;border-radius:12px;color:#334155;text-decoration:none;font-weight:500}
.menu-link.active{background:#F1F5F9;color:var(--violet)}
</style>
</head>
<body>
<nav class="navbar sticky-top border-bottom"><div class="container py-2 d-flex align-items-center gap-2">
<button class="btn btn-light border rounded-circle" data-bs-toggle="offcanvas" data-bs-target="#sideMenu" style="width:44px;height:44px"><i class="bi bi-list"></i></button>
<a href="index.html" class="brand ms-1"><span class="logo-circle"><img src="image/SIGNIX.png"></span>Signix</a>
<div class="ms-auto d-flex gap-2"><a href="upload.html" class="btn btn-gradient rounded-pill px-4">Upload</a></div>
</div></nav>

<div class="offcanvas offcanvas-start" id="sideMenu" style="width:320px"><div class="offcanvas-header border-bottom"><a href="index.html" class="brand"><span class="logo-circle"><img src="image/SIGNIX.png"></span>Signix</a><button class="btn-close" data-bs-dismiss="offcanvas"></button></div>
<div class="offcanvas-body d-flex flex-column"><a href="index.html" class="menu-link">Home</a><a href="learn.html" class="menu-link active">Learn KSL</a><a href="upload.html" class="menu-link">Upload</a><a href="about.html" class="menu-link">About</a></div></div>

<section class="py-4"><div class="container">
<div class="p-4 p-lg-5 rounded-5 text-white" style="background:linear-gradient(135deg,#0F172A,#1E1B4B 50%,#1E3A8A)">
<h1 class="display-6 fw-bold">Learn Kenyan Sign Language</h1>
<p class="text-white-50">Search 1,500+ signs by word, meaning or category.</p>
<div class="search-wrap mt-3"><i class="bi bi-search ms-3 text-secondary"></i><input id="searchInput" class="form-control" placeholder="Search Asante, maji, school, family..."><button id="searchBtn" type="button" class="btn btn-gradient rounded-pill px-4">Search</button></div>
</div></div></section>

<section class="container pb-5">
<div class="d-flex gap-2 flex-wrap mb-3" id="filterPills">
<button class="filter-pill active" data-filter="all">All</button>
<button class="filter-pill" data-filter="greetings">Greetings</button>
<button class="filter-pill" data-filter="school">School</button>
<button class="filter-pill" data-filter="food">Food</button>
<button class="filter-pill" data-filter="family">Family</button>
</div>
<div id="signGrid" class="row g-3"></div>
<div id="noResults" class="d-none text-center py-5 bg-white border-2 border rounded-4 mt-3"><i class="bi bi-search fs-1 text-secondary"></i><p class="fw-bold mt-2">No signs found</p><p class="small text-secondary">Try another word like "Asante" or "Maji"</p></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// --- DATA ---
const signs=[
{word:"Asante",meaning:"Thank you",cat:"greetings",icon:"bi-hand-thumbs-up"},
{word:"Jambo",meaning:"Hello",cat:"greetings",icon:"bi-emoji-smile"},
{word:"Maji",meaning:"Water",cat:"food",icon:"bi-droplet"},
{word:"Chakula",meaning:"Food",cat:"food",icon:"bi-egg-fried"},
{word:"Shule",meaning:"School",cat:"school",icon:"bi-book"},
{word:"Mwalimu",meaning:"Teacher",cat:"school",icon:"bi-person-workspace"},
{word:"Mama",meaning:"Mother",cat:"family",icon:"bi-heart"},
{word:"Baba",meaning:"Father",cat:"family",icon:"bi-person"},
{word:"Tafadhali",meaning:"Please",cat:"greetings",icon:"bi-hands"},
{word:"Pole",meaning:"Sorry",cat:"greetings",icon:"bi-emoji-frown"},
{word:"Kitabu",meaning:"Book",cat:"school",icon:"bi-journal-bookmark"},
{word:"Familia",meaning:"Family",cat:"family",icon:"bi-people"}
];

const grid=document.getElementById('signGrid'), input=document.getElementById('searchInput'), btn=document.getElementById('searchBtn'), noRes=document.getElementById('noResults');
let activeCat='all';

function render(list){
 grid.innerHTML=''; if(!list.length){noRes.classList.remove('d-none');return;} noRes.classList.add('d-none');
 list.forEach(s=>{
  const col=document.createElement('div');col.className='col-md-4 col-sm-6';
  col.innerHTML=`<div class="sign-card"><div class="thumb"><i class="bi ${s.icon}"></i></div><div class="p-3"><div class="d-flex justify-content-between"><b>${s.word}</b><span class="badge bg-light text-dark border rounded-pill text-capitalize">${s.cat}</span></div><div class="small text-secondary">${s.meaning}</div><a href="lesson.html?word=${encodeURIComponent(s.word)}" class="btn btn-light border rounded-pill w-100 mt-3 btn-sm fw-semibold">Learn sign</a></div></div>`;
  grid.appendChild(col);
 });
}

function doSearch(){
 const q=input.value.trim().toLowerCase();
 let filtered=signs.filter(s=>{
  const matchCat = activeCat==='all' || s.cat===activeCat;
  const matchQ = !q || s.word.toLowerCase().includes(q) || s.meaning.toLowerCase().includes(q) || s.cat.includes(q);
  return matchCat && matchQ;
 });
 // Also include user uploads that match
 try{
   const vids=JSON.parse(localStorage.getItem('signix_videos')||'[]');
   const uploadMatches=vids.filter(v=>!q||v.word.toLowerCase().includes(q)).map(v=>({word:v.word,meaning:v.desc||'Community upload',cat:'community',icon:'bi-camera-video'}));
   filtered = [...uploadMatches,...filtered];
 }catch{}
 render(filtered);
}

btn.addEventListener('click',doSearch);
input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doSearch();}});
input.addEventListener('input',doSearch);

document.querySelectorAll('.filter-pill').forEach(p=>{
 p.addEventListener('click',()=>{
  document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active'); activeCat=p.dataset.filter; doSearch();
 });
});

// initial
render(signs);
</script>
</body>
</html>
